apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendota-ml-pipeline-canary
  labels:
    app: opendota-ml-pipeline
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opendota-ml-pipeline
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: opendota-ml-pipeline
        track: canary
    spec:
      containers:
      - name: opendota-api
        image: ghcr.io/OWNER/opendota-ml-pipeline:IMAGE_TAG
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: opendota-config
            optional: true
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
