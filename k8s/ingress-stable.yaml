apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opendota-ml-pipeline-ingress
  labels:
    app: opendota-ml-pipeline
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: opendota.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opendota-ml-pipeline-service
            port:
              number: 80
