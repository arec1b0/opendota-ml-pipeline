apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendota-ml-pipeline
  labels:
    app: opendota-ml-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opendota-ml-pipeline
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: opendota-ml-pipeline
    spec:
      containers:
      - name: opendota-api
        image: opendota-ml-pipeline:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: opendota-config
            optional: true
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"